version: 2
updates:
    # Enable version updates for NuGet packages
    -   package-ecosystem: "nuget"
        directory: "/"
        schedule:
            interval: "weekly"
            day: "monday"
            time: "04:00"
        open-pull-requests-limit: 10
        reviewers:
            - "@maintainers"
        assignees:
            - "@maintainers"
        commit-message:
            prefix: "deps"
            prefix-development: "deps-dev"
            include: "scope"
        labels:
            - "dependencies"
            - "nuget"
    
    # Enable version updates for GitHub Actions
    -   package-ecosystem: "github-actions"
        directory: "/"
        schedule:
            interval: "weekly"
            day: "monday"
            time: "04:00"
        open-pull-requests-limit: 5
        reviewers:
            - "@maintainers"
        assignees:
            - "@maintainers"
        commit-message:
            prefix: "ci"
            include: "scope"
        labels:
            - "dependencies"
            - "github-actions"
